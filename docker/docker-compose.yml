version: "3.9"

name: ecommerce-infra

services:
  api-gateway:
    build:
      context: ../ApiGateway
      dockerfile: ApiGateway/Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    depends_on:
      - auth
      - catalog
      - graphrag-api
      - jaeger
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      Services__Auth: http://auth:8080
      Services__Catalog: http://catalog:8080
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    ports:
      - "${GATEWAY_PORT}:8080"

  catalog:
    build:
      context: ../Catalog
      dockerfile: Catalog/Dockerfile
    container_name: catalog
    restart: unless-stopped
    depends_on:
      - postgres
      - rabbitmq
      - minio
      - redis
      - jaeger
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "${CATALOG_PORT}:8080"      

  auth:
    build:
      context: ../Auth
      dockerfile: Auth/Dockerfile
    container_name: auth
    restart: unless-stopped
    depends_on:
      - postgres
      - rabbitmq
      - jaeger
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "${AUTH_PORT}:8080"

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    restart: unless-stopped
    ports:
      - "${OTEL_UI_PORT}:16686" 
      - "${OTEL_GRPC_PORT}:4317" 
      - "${OTEL_HTTP_PORT}:4318" 

  postgres:
    image: postgres:17
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "${PGADMIN_PORT}:80"
    depends_on:
      - postgres

  redis:
    image: redis:latest
    container_name: redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"

  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight
    restart: unless-stopped
    ports:
      - "${REDIS_INSIGHT_PORT}:5540"
    depends_on:
      - redis

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT}:6333"
      - "${QDRANT_UI_PORT}:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  neo4j:
    image: neo4j:latest
    container_name: neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASSWORD}
    ports:
      - "${NEO4J_HTTP_PORT}:7474"
      - "${NEO4J_BOLT_PORT}:7687"
    volumes:
      - neo4j_data:/data

  rabbitmq:
    image: rabbitmq:management
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_UI_PORT}:15672"

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_PORT}:9000"        
      - "${MINIO_CONSOLE_PORT}:9001" 
    volumes:
      - minio_data:/data

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT}:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  graphrag-api:
    build:
      context: ../GraphRAG
      dockerfile: docker/Dockerfile
    container_name: graphrag-api
    restart: unless-stopped
    environment:
      SERVICE_MODE: api
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_COLLECTION: products
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/
      RABBITMQ_EXCHANGE: catalog-exchange
      RABBITMQ_QUEUE: graphrag-ingestion
      OLLAMA_BASE_URL: http://ollama:11434
      EMBEDDING_MODEL: ${GRAPHRAG_EMBEDDING_MODEL}
      RERANKER_MODEL: ${GRAPHRAG_RERANKER_MODEL}
      GENERATION_MODEL: ${GRAPHRAG_GENERATION_MODEL}
      GENERATION_MODEL_LARGE: ${GRAPHRAG_GENERATION_MODEL_LARGE}
      OTEL_ENDPOINT: http://jaeger:4317
      SERVICE_NAME: graphrag-service
      OTEL_ENABLED: "true"
      LOG_LEVEL: ${GRAPHRAG_LOG_LEVEL}
    ports:
      - "${GRAPHRAG_API_PORT}:8100"
    depends_on:
      - qdrant
      - neo4j
      - rabbitmq
      - ollama
      - jaeger
    entrypoint: ["bash", "/app/docker/entrypoint.sh"]

  graphrag-worker:
    build:
      context: ../GraphRAG
      dockerfile: docker/Dockerfile
    container_name: graphrag-worker
    restart: unless-stopped
    environment:
      SERVICE_MODE: worker
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_COLLECTION: products
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/
      RABBITMQ_EXCHANGE: catalog-exchange
      RABBITMQ_QUEUE: graphrag-ingestion
      OLLAMA_BASE_URL: http://ollama:11434
      EMBEDDING_MODEL: ${GRAPHRAG_EMBEDDING_MODEL}
      RERANKER_MODEL: ${GRAPHRAG_RERANKER_MODEL}
      OTEL_ENDPOINT: http://jaeger:4317
      SERVICE_NAME: graphrag-worker
      OTEL_ENABLED: "true"
      LOG_LEVEL: ${GRAPHRAG_LOG_LEVEL}
    depends_on:
      - qdrant
      - neo4j
      - rabbitmq
      - ollama
      - jaeger
    entrypoint: ["bash", "/app/docker/entrypoint.sh"]

volumes:
  postgres_data:
  qdrant_data:
  neo4j_data:
  minio_data:
  ollama_data: